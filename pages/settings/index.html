<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百分之一小作文生成器 - 黑名单管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🚫 黑名单管理</h1>

    <!-- 状态提示 -->
    <div id="statusMsg" class="status-msg"></div>

    <!-- 群聊黑名单 -->
    <div class="section">
      <h3>群聊黑名单</h3>
      <div class="add-form">
        <input type="text" id="addGroupInput" placeholder="输入群号" />
        <button onclick="addBlacklist('group')">添加</button>
      </div>
      <ul class="blacklist-list" id="groupList">
        <li class="loading">加载中...</li>
      </ul>
    </div>

    <!-- 私聊黑名单 -->
    <div class="section">
      <h3>私聊黑名单</h3>
      <div class="add-form">
        <input type="text" id="addPrivateInput" placeholder="输入QQ号" />
        <button onclick="addBlacklist('private')">添加</button>
      </div>
      <ul class="blacklist-list" id="privateList">
        <li class="loading">加载中...</li>
      </ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
